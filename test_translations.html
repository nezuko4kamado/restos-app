<!DOCTYPE html>
<html>
<head>
    <title>Translation Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>Translation System Test</h1>
    <div id="results"></div>
    
    <script type="module">
        import itTranslations from './src/locales/it.json' assert { type: 'json' };
        import esTranslations from './src/locales/es.json' assert { type: 'json' };
        import frTranslations from './src/locales/fr.json' assert { type: 'json' };
        import deTranslations from './src/locales/de.json' assert { type: 'json' };
        import ltTranslations from './src/locales/lt.json' assert { type: 'json' };
        
        function getNestedValue(obj, path) {
            const keys = path.split('.');
            let current = obj;
            for (const key of keys) {
                if (current && typeof current === 'object' && key in current) {
                    current = current[key];
                } else {
                    return path;
                }
            }
            return typeof current === 'string' ? current : path;
        }
        
        const tests = [
            { key: 'settingsSection.italy', expected: { it: 'Italia', es: 'Italia', fr: 'Italie', de: 'Italien', lt: 'Italija' } },
            { key: 'settingsSection.generalSettings', expected: { it: 'Impostazioni Generali', es: 'Configuración General', fr: 'Paramètres Généraux', de: 'Allgemeine Einstellungen', lt: 'Bendrieji Nustatymai' } },
            { key: 'subscriptions.title', expected: { it: 'Abbonamenti', es: 'Suscripciones', fr: 'Abonnements', de: 'Abonnements', lt: 'Prenumeratos' } }
        ];
        
        const translations = { it: itTranslations, es: esTranslations, fr: frTranslations, de: deTranslations, lt: ltTranslations };
        const results = document.getElementById('results');
        
        tests.forEach(test => {
            Object.entries(test.expected).forEach(([lang, expected]) => {
                const actual = getNestedValue(translations[lang], test.key);
                const isSuccess = actual === expected;
                const div = document.createElement('div');
                div.className = `test ${isSuccess ? 'success' : 'error'}`;
                div.innerHTML = `
                    <strong>${lang.toUpperCase()}</strong> - ${test.key}<br>
                    Expected: ${expected}<br>
                    Actual: ${actual}<br>
                    ${isSuccess ? '✅ PASS' : '❌ FAIL'}
                `;
                results.appendChild(div);
            });
        });
    </script>
</body>
</html>
